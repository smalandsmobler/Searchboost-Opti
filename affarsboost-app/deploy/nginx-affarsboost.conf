# ── Nginx-konfiguration för affarsboost.se ──────────────────────────────────
#
# Placering på EC2: /etc/nginx/sites-available/affarsboost
# Aktivera med: sudo ln -s /etc/nginx/sites-available/affarsboost /etc/nginx/sites-enabled/
# Testa med: sudo nginx -t
# Ladda om med: sudo systemctl reload nginx
#
# Förutsättningar:
#   1. affarsboost.se DNS A-record pekar mot 51.21.116.7
#   2. Let's Encrypt-cert är utfärdat (kör setup-ssl.sh)
#   3. affarsboost-app körs på port 3002 (Next.js, PM2-process 'affarsboost')

# ── HTTP → HTTPS-redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name affarsboost.se www.affarsboost.se xn--affrsboost-s5a.se www.xn--affrsboost-s5a.se;

    # Certbot-verifiering
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Allt annat → HTTPS
    location / {
        return 301 https://affarsboost.se$request_uri;
    }
}

# ── www + punycode-redirect → canonical ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.affarsboost.se xn--affrsboost-s5a.se www.xn--affrsboost-s5a.se;

    ssl_certificate     /etc/letsencrypt/live/affarsboost.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/affarsboost.se/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://affarsboost.se$request_uri;
}

# ── Huvud-vhost: affarsboost.se → Next.js port 3002 ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name affarsboost.se;

    ssl_certificate     /etc/letsencrypt/live/affarsboost.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/affarsboost.se/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Loggar
    access_log /var/log/nginx/affarsboost.access.log;
    error_log  /var/log/nginx/affarsboost.error.log;

    # Stripe webhook behöver råa bytes — ingen buffring
    location /api/stripe/webhook {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 1m;
    }

    # Next.js statiska assets — lång cache
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3002;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Allt annat → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10m;
    }
}
