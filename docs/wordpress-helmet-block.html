<!-- Klistra in som "Anpassad HTML"-block i Gutenberg, ovanför "Föredrar du att ringa direkt?"-sektionen -->

<style>
.sb-helmet-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px 40px;
  cursor: pointer;
  gap: 0;
}
.sb-helmet-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #00d4ff;
  margin-bottom: 18px;
  text-shadow: 0 0 12px rgba(0,212,255,0.7);
  font-family: -apple-system, 'Inter', sans-serif;
  animation: sb-h-flicker 4s infinite;
}
@keyframes sb-h-flicker {
  0%,96%,100% { opacity: 1; }
  97% { opacity: 0.5; }
  98% { opacity: 1; }
  99% { opacity: 0.3; }
}
.sb-helmet-svg-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sb-helmet-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(233,30,140,0.18) 0%, rgba(0,212,255,0.08) 50%, transparent 72%);
  animation: sb-h-pulse 2.5s ease-in-out infinite;
}
@keyframes sb-h-pulse {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.12); opacity: 1; }
}
.sb-helmet-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,0.2);
  animation: sb-h-ring 3s linear infinite;
}
.sb-helmet-ring-2 {
  position: absolute;
  inset: -22px;
  border-radius: 50%;
  border: 1px dashed rgba(233,30,140,0.15);
  animation: sb-h-ring 6s linear infinite reverse;
}
@keyframes sb-h-ring {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* SVG hjälm */
.sb-helmet-svg {
  width: 140px;
  height: 140px;
  filter: drop-shadow(0 0 16px rgba(0,212,255,0.5)) drop-shadow(0 0 32px rgba(233,30,140,0.3));
  transition: filter 0.3s, transform 0.3s;
}
.sb-helmet-wrap:hover .sb-helmet-svg {
  filter: drop-shadow(0 0 24px rgba(0,212,255,0.8)) drop-shadow(0 0 48px rgba(233,30,140,0.5));
  transform: scale(1.05) translateY(-3px);
}
.sb-helmet-wrap:hover .sb-visor-glow {
  opacity: 1;
}
.sb-visor-glow {
  opacity: 0.7;
  transition: opacity 0.3s;
  animation: sb-visor-anim 2s ease-in-out infinite;
}
@keyframes sb-visor-anim {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.sb-helmet-sub {
  margin-top: 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  font-family: -apple-system, 'Inter', sans-serif;
  letter-spacing: 0.04em;
  text-align: center;
  transition: color 0.2s;
}
.sb-helmet-wrap:hover .sb-helmet-sub {
  color: rgba(255,255,255,0.75);
}

/* Scanline-effekt */
.sb-helmet-wrap::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00d4ff, transparent);
  animation: sb-scan 4s linear infinite;
  pointer-events: none;
  opacity: 0.4;
}
.sb-helmet-wrap { position: relative; overflow: hidden; }
@keyframes sb-scan {
  0%   { top: 0; opacity: 0; }
  10%  { opacity: 0.4; }
  90%  { opacity: 0.4; }
  100% { top: 100%; opacity: 0; }
}
</style>

<div class="sb-helmet-wrap" onclick="window.SBChat && window.SBChat.open()" role="button" aria-label="Öppna AI-chatten" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){window.SBChat&&window.SBChat.open()}">

  <div class="sb-helmet-label">AI-assistent online</div>

  <div class="sb-helmet-svg-wrap">
    <div class="sb-helmet-glow"></div>
    <div class="sb-helmet-ring"></div>
    <div class="sb-helmet-ring-2"></div>

    <!-- Cyberpunk-hjälm SVG -->
    <svg class="sb-helmet-svg" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Hjälmens huvud/skal -->
      <path d="M70 8 C38 8 18 30 18 58 L18 88 C18 96 24 102 32 102 L108 102 C116 102 122 96 122 88 L122 58 C122 30 102 8 70 8 Z"
            fill="#0d1117" stroke="#1e2a3a" stroke-width="1.5"/>

      <!-- Yttre kontur / pannplåt -->
      <path d="M70 10 C40 10 20 31 20 58 L20 62 C32 55 50 50 70 50 C90 50 108 55 120 62 L120 58 C120 31 100 10 70 10 Z"
            fill="#111827"/>
      <path d="M70 10 C40 10 20 31 20 58 L20 62 C32 55 50 50 70 50 C90 50 108 55 120 62 L120 58 C120 31 100 10 70 10 Z"
            stroke="#e91e8c" stroke-width="0.8" opacity="0.6"/>

      <!-- Decorativa linjer -->
      <line x1="70" y1="14" x2="70" y2="48" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
      <line x1="40" y1="22" x2="48" y2="50" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
      <line x1="100" y1="22" x2="92" y2="50" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>

      <!-- Visir (glödande) -->
      <path d="M28 66 C28 60 34 55 42 55 L98 55 C106 55 112 60 112 66 L112 80 C112 86 106 90 98 90 L42 90 C34 90 28 86 28 80 Z"
            fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" class="sb-visor-glow"/>

      <!-- Visir glöd-fill -->
      <path d="M30 67 C30 62 35 57 42 57 L98 57 C105 57 110 62 110 67 L110 79 C110 84 105 89 98 89 L42 89 C35 89 30 84 30 79 Z"
            fill="url(#visorGrad)" opacity="0.6" class="sb-visor-glow"/>

      <!-- Reflex på visir -->
      <path d="M38 62 L55 62 L52 68 L35 68 Z" fill="white" opacity="0.06" rx="2"/>
      <path d="M36 63 L48 63" stroke="white" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>

      <!-- HUD-linjer i visir -->
      <line x1="35" y1="73" x2="60" y2="73" stroke="#00d4ff" stroke-width="0.6" opacity="0.5"/>
      <line x1="35" y1="76" x2="50" y2="76" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>
      <line x1="80" y1="73" x2="105" y2="73" stroke="#00d4ff" stroke-width="0.6" opacity="0.5"/>
      <line x1="90" y1="76" x2="105" y2="76" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>

      <!-- Centrum-ikon i visir (Searchboost S) -->
      <circle cx="70" cy="72.5" r="8" fill="rgba(233,30,140,0.15)" stroke="#e91e8c" stroke-width="0.8" opacity="0.8"/>
      <text x="70" y="76.5" text-anchor="middle" font-family="Arial" font-weight="800" font-size="9" fill="#e91e8c" opacity="0.9">S</text>

      <!-- Hakplåt -->
      <path d="M32 98 L108 98 L104 108 L36 108 Z" fill="#0a1220" stroke="#1e2a3a" stroke-width="1"/>
      <line x1="40" y1="103" x2="100" y2="103" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>

      <!-- Sidoplåtar -->
      <path d="M18 70 L20 88 C20 96 24 100 30 101 L18 98 Z" fill="#111827" stroke="#1e2a3a" stroke-width="0.8"/>
      <path d="M122 70 L120 88 C120 96 116 100 110 101 L122 98 Z" fill="#111827" stroke="#1e2a3a" stroke-width="0.8"/>

      <!-- Nit-detaljer -->
      <circle cx="26" cy="80" r="2" fill="#1e2a3a" stroke="#00d4ff" stroke-width="0.6" opacity="0.6"/>
      <circle cx="114" cy="80" r="2" fill="#1e2a3a" stroke="#00d4ff" stroke-width="0.6" opacity="0.6"/>
      <circle cx="26" cy="72" r="1.5" fill="#e91e8c" opacity="0.5"/>
      <circle cx="114" cy="72" r="1.5" fill="#e91e8c" opacity="0.5"/>

      <!-- Gradients -->
      <defs>
        <linearGradient id="visorGrad" x1="30" y1="57" x2="110" y2="89" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#001a2e"/>
          <stop offset="50%" stop-color="#003a5c"/>
          <stop offset="100%" stop-color="#001a2e"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="sb-helmet-sub">Klicka för att chatta med AI:n</div>

</div>
