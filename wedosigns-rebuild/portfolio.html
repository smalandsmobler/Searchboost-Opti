<!DOCTYPE html>

  <title>Portfolio – We Do Signs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bebas { font-family: 'Bebas Neue', sans-serif; }
    .neon {
      color: #FFEA00;
      text-shadow: 0 0 25px #FFEA00, 0 0 50px #FFEA00;
      animation: flicker 2.5s infinite alternate;
    }
    @keyframes flicker {
      0% { text-shadow: 0 0 20px #FFEA00; }
      100% { text-shadow: 0 0 40px #FFEA00, 0 0 80px #FFEA00; }
    }
    .img-container {
      overflow: hidden;
      border: 3px solid transparent;
      transition: all 0.4s ease;
    }
    .img-container:hover {
      border-color: #FFEA00;
      transform: scale(1.03);
    }
    @keyframes slowZoom {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }
    .hero-bg {
      animation: slowZoom 8s ease-in-out infinite alternate;
    }
  </style>
</head>

      <a href="tel:0793020787" class="bg-[#FFEA00] text-black font-black px-8 py-4 rounded-2xl hover:scale-105 transition-all">079-302 07 87</a>
