# Nginx server-block för coachning.searchboost.se
# Lägg i /etc/nginx/sites-available/coachning och symlinka till sites-enabled.
# Certifikatet fylls i av certbot (steg i DEPLOY.md) — kör utan SSL först.

server {
    listen 80;
    listen [::]:80;
    server_name coachning.searchboost.se;

    # Begränsa uppladdningsstorlek (Takeout-zip kan vara stora, men de parsas
    # i webbläsaren och laddas aldrig upp hit — håll detta lågt).
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI-svar kan ta några sekunder
    }
}

# Efter `certbot --nginx -d coachning.searchboost.se` lägger certbot till ett
# 443-block och en 80→443-redirect automatiskt. Inget mer behöver göras manuellt.
